[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "prague"        # EIP-7702 type-4 codegen + transient storage (EIP-1153)
optimizer = true
optimizer_runs = 200
via_ir = true                 # required by the test-only vendored P256 verifier (stack-heavy EC math)
fs_permissions = [{ access = "read", path = "./test/vectors" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
megaeth_testnet = "https://carrot.megaeth.com/rpc"

[etherscan]
megaeth_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 6343 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
